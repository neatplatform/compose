## https://prometheus.io/docs/prometheus/latest/configuration/alerting_rules
## https://prometheus.io/docs/practices/alerting
##

## For alerting rules, we use the global evaluation interval.
## Overriding it can introduce subtle issues:
## a very short interval increases Prometheus load, while a long one delays alert firing.
##

groups:

  - name: node
    rules:

      - alert: InstanceDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
          scope: vm
          team: infra
        annotations:
          summary: "Instance {{ $labels.instance }} down"
          description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 5 minutes."
          runbook_url: "TBD"
          dashboard_url: "TBD"

      - alert: HighCPUUsage
        expr: node:cpu_usage_average:percent > 80
        for: 5m
        labels:
          severity: warning
          scope: vm
          team: infra
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ printf \"%.1f\" $value }}% (threshold: 80%)."
          runbook_url: "TBD"
          dashboard_url: "TBD"

      - alert: HighMemoryUsage
        expr: node:memory_usage_average:percent > 80
        for: 5m
        labels:
          severity: warning
          scope: vm
          team: infra
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ printf \"%.1f\" $value }}% (threshold: 80%)."
          runbook_url: "TBD"
          dashboard_url: "TBD"

      - alert: HighDiskUsage
        expr: node:disk_usage_average:percent > 80
        for: 10m
        labels:
          severity: warning
          scope: vm
          team: infra
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is {{ printf \"%.1f\" $value }}% (threshold: 80%)."
          runbook_url: "TBD"
          dashboard_url: "TBD"

      - alert: CriticalDiskUsage
        expr: node:disk_usage_average:percent > 90
        for: 5m
        labels:
          severity: critical
          scope: container
          team: infra
        annotations:
          summary: "Critical disk usage on {{ $labels.instance }}"
          description: "Disk usage is {{ printf \"%.1f\" $value }}% (threshold: 90%)."
          runbook_url: "TBD"
          dashboard_url: "TBD"
