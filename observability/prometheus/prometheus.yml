## https://prometheus.io/docs/prometheus/latest/configuration/configuration
##

global:
  scrape_interval: 20s
  scrape_timeout: 10s
  evaluation_interval: 1m
  external_labels:
    monitor: 'prometheus'

storage:
  tsdb:
    retention:
      time: 30d

alerting:
  alertmanagers:
    - static_configs:
      - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # Prometheus metrics
  - job_name: prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090']

  # Alertmanager metrics
  - job_name: alertmanager
    static_configs:
      - targets: ['alertmanager:9093']

  # Host metrics
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # Container metrics
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Scarpping metrics from services running on the host
  - job_name: host:4000
    static_configs:
      - targets: ['host.internal:4000']
