## https://prometheus.io/docs/alerting/latest/alertmanager
## https://prometheus.io/docs/alerting/latest/configuration
##
## Notifications:
##
##   https://prometheus.io/docs/alerting/latest/integrations
##   https://prometheus.io/docs/alerting/latest/alerts_api
##   https://prometheus.io/docs/alerting/latest/notifications
##

##
## Alertmanager bundles incoming alerts into groups before sending notifications,
## avoiding a flood of individual messages when multiple related things go wrong.
##
##   • group_by           The labels by which incoming alerts are grouped.
##   • group_wait         How long to wait after seeing the first alert in a new group before sending the initial notification.
##                        Extra alerts that arrive for the same group within this window are bundled into that first message.
##   • group_interval     How long to wait before sending a follow-up for changes to the group
##                        after a group has already fired its first notification.
##   • repeat_interval    How long to wait before re-sending the same notification as a reminder,
##                        if a group is still firing and nothing has changed.
##
## Alertmanager evaluates routes as a tree, top-down, starting at the root route.
## The root route has no matchers, so it matches every alert.
##
## Routing flow for each incoming alert:
##
##   1. The alert first enters the root route.
##   2. Alertmanager evaluates child routes in order.
##      • If a child matches, that child receiver handles the alert and evaluation stops unless `continue: true` is set.
##   3. If no child matches, Alertmanager falls back to the root route receiver.
##
## In practice, the root receiver acts as a catch-all for alerts that do not match any more specific child route.
##

global:
  resolve_timeout: 5m

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:

    - receiver: slack-critical
      matchers:
        - severity = critical
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h

    - receiver: slack-warning
      matchers:
        - severity = warning
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

receivers:

  # No-op fallback receiver for any alerts that do not match a more specific route.
  - name: default

  - name: slack-critical
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_api_url'
        channel: '#alerts'
        send_resolved: true
        title: ':red_circle: [CRITICAL] {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.infra.text" . }}'

  - name: slack-warning
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_api_url'
        channel: '#alerts'
        send_resolved: true
        title: ':warning: [WARNING] {{ .GroupLabels.alertname }}'
        text: '{{ template "slack.infra.text" . }}'

# Inhibition suppresses notifications for certain alerts if other alerts are already firing,
# avoiding a burst of notifications and reducing noise for the same root cause.
inhibit_rules:

  # If an InstanceDown alert is firing for a node, suppress any alerts for the same node.
  - source_matchers:
      - alertname = InstanceDown
    target_matchers:
      - scope = vm
    equal: [instance]
